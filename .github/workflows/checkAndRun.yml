name: 每日分析排程

on:
  schedule:
    - cron: '*/10 13-16 * * 1-5'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TiDB_Host: ${{ secrets.TiDB_Host }}
  TiDB_User: ${{ secrets.TiDB_User }}
  TIDB_PASS: ${{ secrets.TIDB_PASS }}
  TIDB_NAME: ${{ secrets.TIDB_NAME }}
  FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
  FUGLE_TOKEN: ${{ secrets.FUGLE_TOKEN }}
  GEMINI_TOKEN: ${{ secrets.GEMINI_TOKEN }}

jobs:
  stock_job:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4

    - name: 設定 PHP 環境
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: pdo, pdo_mysql

    - name: 執行資料檢查與分析
      run: |
        # 執行檢查程式，並允許失敗後繼續執行後面的 Shell 指令
        php checkAndRun.php || EXIT_STATUS=$?
        
        # 取得結束碼，如果沒有出錯則 EXIT_STATUS 會是空的或 0
        STATUS=${EXIT_STATUS:-0}

        if [ $STATUS -eq 0 ]; then
          echo "檢查通過 (exit 0)，開始執行數據分析..."
          php index.php
        elif [ $STATUS -eq 1 ]; then
          echo "檢查不通過 (exit 1)，略過後續步驟並正常結束。"
          exit 0
        else
          echo "程式發生 exit 1 以外的錯誤 (碼: $STATUS)，回報失敗。"
          exit $STATUS
        fi
name: TWSE_Stock_Auto_Update

on:
  schedule:
    - cron: '00 18 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4

    - name: 設定 PHP 環境
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: pdo, pdo_mysql # 確保有連線資料庫需要的擴充功能

    - name: 執行股票抓取程式
      env:
        # 這裡會讀取你在 GitHub Secrets 設定的資料
        TiDB_Host: ${{ secrets.TiDB_Host }}
        TiDB_User: ${{ secrets.TiDB_User }}
        TIDB_PASS: ${{ secrets.TIDB_PASS }}
        TIDB_NAME: ${{ secrets.TIDB_NAME }}
        FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        FUGLE_TOKEN: ${{ secrets.FUGLE_TOKEN }}
        GEMINI_TOKEN: ${{ secrets.GEMINI_TOKEN }}
      run: php batchUpdate.php
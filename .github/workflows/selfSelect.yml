name: selfSelect

on:
  repository_dispatch:
    types: [selfSelect]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TiDB_Host: ${{ secrets.TiDB_Host }}
  TiDB_User: ${{ secrets.TiDB_User }}
  TIDB_PASS: ${{ secrets.TIDB_PASS }}
  TIDB_NAME: ${{ secrets.TIDB_NAME }}
  FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
  FUGLE_TOKEN: ${{ secrets.FUGLE_TOKEN }}
  GEMINI_TOKEN: ${{ secrets.GEMINI_TOKEN }}
  LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
  LINE_TARGET: ${{ secrets.LINE_TARGET }}
  GAS_URL_TRIGGERS: ${{ secrets.GAS_URL_TRIGGERS }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: pdo, pdo_mysql

    - name: Print
      run: | 
        echo '${{ toJson(github.event.client_payload.stock) }}'

    - name: Run Update
      env:
        STOCK_DATA: ${{ toJson(github.event.client_payload.stock) }}
      run: php selfSelect.php

    - name: Commit And Push JSON files
      if: always()
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add .
        if git diff --quiet && git diff --staged --quiet; then
          echo "沒有偵測到新的 JSON 檔案變更，略過提交。"
        else
          git commit -m "自動更新自選分析數據: $(date +'%Y-%m-%d %H:%M')"
          git push
        fi

    - name: Sync data folder to FTP
      if: always()
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./data/
        server-dir: /htdocs/data/
        dangerous-clean-slate: true
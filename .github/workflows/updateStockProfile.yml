name: updateStockProfile

on:
  # schedule:
  #   - cron: '3,23,43 12-15 * * 1-5'
  repository_dispatch:
    types: [updateStockProfile]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TiDB_Host: ${{ secrets.TiDB_Host }}
  TiDB_User: ${{ secrets.TiDB_User }}
  TIDB_PASS: ${{ secrets.TIDB_PASS }}
  TIDB_NAME: ${{ secrets.TIDB_NAME }}
  FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
  FUGLE_TOKEN: ${{ secrets.FUGLE_TOKEN }}
  GEMINI_TOKEN: ${{ secrets.GEMINI_TOKEN }}
  LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
  LINE_TARGET: ${{ secrets.LINE_TARGET }}
  GAS_URL_TRIGGERS: ${{ secrets.GAS_URL_TRIGGERS }}

jobs:
  stock_job:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4
      with:
        # 預設為 1，改為 0 可以取得完整歷史，對於頻繁 push 較穩定
        fetch-depth: 0

    - name: 設定 PHP 環境
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: pdo, pdo_mysql

    - name: 執行資料檢查與分析
      run: php updateStockProfile.php

    - name: 提交並推送 JSON 檔案
      run: |
        # 設定 Git 使用者資訊（GitHub Action 虛擬身份）
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 檢查是否有新檔案產生（假設你的 JSON 存在 data/ 資料夾）
        # 如果你直接存在根目錄，請改為 git add *.json
        git add .
        
        # 檢查是否有變更需要提交，避免沒有新檔案時報錯
        if git diff --quiet && git diff --staged --quiet; then
          echo "沒有偵測到新的 JSON 檔案變更，略過提交。"
        else
          git commit -m "自動更新股票分析數據: $(date +'%Y-%m-%d %H:%M')"
          git push
        fi

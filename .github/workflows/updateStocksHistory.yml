name: 歷史資料更新(周一~周五 晚間11:30)

on:
  schedule:
    - cron: '30 15 * * 1-5' 
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TiDB_Host: ${{ secrets.TiDB_Host }}
  TiDB_User: ${{ secrets.TiDB_User }}
  TIDB_PASS: ${{ secrets.TIDB_PASS }}
  TIDB_NAME: ${{ secrets.TIDB_NAME }}
  FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
  FUGLE_TOKEN: ${{ secrets.FUGLE_TOKEN }}
  GEMINI_TOKEN: ${{ secrets.GEMINI_TOKEN }}

jobs:
  stock_job:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4

    - name: 設定 PHP 環境
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: pdo, pdo_mysql

    - name: 執行資料抓取 (updateAll.php)
      run: php updateAll.php

    - name: 執行數據分析與更新 (batchUpdate.php)
      run: php batchUpdate.php
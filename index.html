<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盤後籌碼深度分析系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/fixedcolumns/4.3.0/css/fixedColumns.dataTables.min.css">
    <style>
        body {
            background-color: #020617;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* 表格自定義樣式 */
        .dataTables_wrapper {
            background: #0f172a;
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid #1e293b;
            color: #cbd5e1;
        }

        table.dataTable thead th {
            background-color: #1e293b !important;
            color: #38bdf8 !important;
            border-bottom: 2px solid #0ea5e9 !important;
            text-align: center !important;
            padding: 12px 10px !important;
        }

        table.dataTable tbody td {
            background-color: #0f172a !important;
            border-bottom: 1px solid #1e293b !important;
            text-align: center;
        }

        .DTFC_LeftWrapper {
            border-right: 3px solid #0ea5e9;
        }

        tr:hover td {
            background-color: #1e293b !important;
            cursor: pointer;
        }

        /* 捲軸美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Modal 動畫 */
        .modal-active {
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body class="p-4 md:p-6">
    <div class="max-w-[1650px] mx-auto">
        <!-- 頂部導覽列 -->
        <header
            class="mb-6 flex flex-col md:flex-row justify-between items-center gap-4 border-b border-slate-800 pb-6">
            <div class="flex items-center gap-3">
                <h1 class="text-3xl font-bold text-sky-400 tracking-tight">籌碼深度篩選</h1>
                <button onclick="openInfoModal()" class="text-slate-400 hover:text-sky-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </button>
            </div>

            <div class="flex flex-wrap items-center gap-4">
                <div class="flex items-center gap-3 bg-slate-800 px-4 py-2 rounded-xl border border-slate-700">
                    <span class="text-slate-400 text-sm font-medium">數據日期</span>
                    <select id="dateSelect"
                        class="bg-transparent border-none text-sky-400 font-bold focus:ring-0 cursor-pointer"></select>
                </div>
                <div class="flex gap-2">
                    <a href="#"
                        class="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-sm text-sky-300 transition-all">🏠
                        首頁</a>
                    <a href="https://mopsov.twse.com.tw" target="_blank"
                        class="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-sm text-sky-300 transition-all">🏆
                        公開資訊</a>
                </div>
            </div>
        </header>

        <!-- 主要表格區塊 -->
        <div class="shadow-2xl overflow-hidden">
            <table id="stockTable" class="display stripe nowrap w-full">
                <thead>
                    <tr>
                        <th>代號</th>
                        <th>名稱</th>
                        <th>族群概念</th>
                        <th>標籤</th>
                        <th>收盤</th>
                        <th>成交量</th>
                        <th>昨量比</th>
                        <th>1日集中</th>
                        <th>5日集中</th>
                        <th>外資5日</th>
                        <th>投信5日</th>
                        <th>券補力</th>
                        <th>券砸力</th>
                        <th>融資餘額</th>
                        <th>借券餘額</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- 1. 說明 Modal -->
    <div id="infoModal" class="hidden fixed inset-0 z-[120] flex items-center justify-center bg-slate-950/80 p-4">
        <div
            class="bg-slate-900 border border-slate-700 rounded-2xl max-w-2xl w-full max-h-[85vh] overflow-hidden flex flex-col shadow-2xl">
            <div class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-800/50">
                <h3 class="text-xl font-bold text-sky-400">系統使用說明</h3>
                <button onclick="closeModal('infoModal')" class="text-slate-400 hover:text-white text-2xl">✕</button>
            </div>
            <div class="p-8 overflow-y-auto space-y-6 text-slate-300 leading-relaxed">
                <section>
                    <h4 class="text-white font-bold mb-2 flex items-center gap-2">📊 圖表查看</h4>
                    <p>點擊表格中<span class="text-sky-400 font-bold">任何一列</span>，即可開啟該個股的深度籌碼趨勢圖。包含法人、融資、借券的 5 日累計趨勢。</p>
                </section>
                <section>
                    <h4 class="text-white font-bold mb-2 flex items-center gap-2">🏷️ 標籤檢視</h4>
                    <p>若標籤內容過長，可點擊標籤旁的<span class="bg-slate-700 px-1 rounded text-xs text-white">更</span>按鈕，查看完整的標籤內容。
                    </p>
                </section>
                <section>
                    <h4 class="text-white font-bold mb-2 flex items-center gap-2">💡 欄位解釋</h4>
                    <ul class="list-disc list-inside space-y-1 text-sm">
                        <li><span class="text-sky-400">券補力</span>：資券比相關數據，代表空頭回補力道。</li>
                        <li><span class="text-sky-400">集中度</span>：主力買賣張數佔成交量之比例。</li>
                    </ul>
                </section>
            </div>
            <div class="p-4 border-t border-slate-800 text-right">
                <button onclick="closeModal('infoModal')"
                    class="px-6 py-2 bg-sky-600 hover:bg-sky-500 text-white rounded-lg transition-colors">我了解了</button>
            </div>
        </div>
    </div>

    <!-- 2. 標籤明細 Modal -->
    <div id="tagModal" class="hidden fixed inset-0 z-[130] flex items-center justify-center bg-slate-950/80 p-4">
        <div class="bg-slate-800 border border-slate-600 rounded-xl shadow-2xl max-w-md w-full p-6">
            <h3 class="text-xl font-bold text-sky-400 mb-4" id="modalStockTitle"></h3>
            <div id="modalTagContent" class="flex flex-wrap gap-2 mb-6"></div>
            <button onclick="closeModal('tagModal')"
                class="w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-lg font-bold transition-colors">確定</button>
        </div>
    </div>

    <!-- 3. 專業趨勢圖表 Modal -->
    <div id="chartModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/90 p-4">
        <div
            class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-6xl h-[90vh] flex flex-col shadow-2xl overflow-hidden">
            <div class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-800/40">
                <div>
                    <h2 class="text-2xl font-bold text-white" id="chartTitle">個股趨勢</h2>
                    <p class="text-slate-400 text-sm mt-1">折線：5日累計 & 價格 | 柱狀：每日增減</p>
                </div>
                <button onclick="closeModal('chartModal')"
                    class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-700 text-slate-300 text-2xl">✕</button>
            </div>
            <div id="mainChart" class="flex-1 w-full bg-slate-900 p-4"></div>
            <div class="p-4 border-t border-slate-800 flex justify-between items-center bg-slate-900">
                <div class="text-xs text-slate-500">※數據僅供參考，不構成投資建議</div>
                <button onclick="closeModal('chartModal')"
                    class="px-8 py-2 bg-sky-600 hover:bg-sky-500 text-white rounded-lg font-bold transition-colors">關閉圖表</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/fixedcolumns/4.3.0/js/dataTables.fixedColumns.min.js"></script>

    <script>
        let table;
        let chartInstance = null;
        let cachedChartData = {};

        $(document).ready(function () {
            // 初始化 DataTable
            table = $('#stockTable').DataTable({
                scrollX: true,
                fixedColumns: { left: 2 },
                pageLength: 25,
                language: { url: "https://cdn.datatables.net/plug-ins/1.13.7/i18n/zh-HANT.json" },
                columnDefs: [{ className: "dt-center", targets: "_all" }]
            });

            // 行點擊事件 (排除按鈕)
            $('#stockTable tbody').on('click', 'tr', function (e) {
                if ($(e.target).closest('button').length) return;
                const row = table.row(this).data();
                if (row) openChart(row[0], $(row[1]).text());
            });

            initSystem();
        });

        // 系統初始化：讀取日期清單
        async function initSystem() {
            try {
                const res = await fetch('./data/dateList.json');
                const dates = await res.json();
                const $sel = $('#dateSelect');
                dates.forEach(d => $sel.append(new Option(d, d)));

                $sel.on('change', function () {
                    const date = this.value;
                    loadMainData(date);
                    loadChartData(date);
                }).trigger('change');
            } catch (e) { console.error("Initialization failed:", e); }
        }

        // 載入表格資料
        async function loadMainData(date) {
            try {
                const res = await fetch(`./data/${date}_filter.json`);
                const data = await res.json();
                table.clear();
                data.forEach(item => {
                    const tagShort = item.tags.length > 10 ? item.tags.substring(0, 10) + '...' : item.tags;
                    const tagBtn = `<div class="flex items-center justify-center gap-1">
                        <span class="text-xs text-slate-400">${tagShort}</span>
                        <button onclick="showTagDetails('${item.stock_name}', '${item.tags}')" class="text-[10px] bg-slate-700 px-1 rounded hover:bg-sky-600 transition-colors">更</button>
                    </div>`;

                    table.row.add([
                        item.stock_id, `<span class="text-sky-400 font-bold">${item.stock_name}</span>`,
                        item.concept, tagBtn, item.close, item.vol, item.vol_ratio,
                        item.con1, item.con5, item.foreign_sum5, item.trust_sum5,
                        item.squeeze, item.bullet, item.margin_balance, item.sbl_total
                    ]);
                });
                table.draw();
            } catch (e) { console.error("Load table error:", e); }
        }

        // 預載圖表 JSON
        async function loadChartData(date) {
            try {
                const res = await fetch(`./data/${date}_charts.json`);
                const json = await res.json();
                cachedChartData = json.stocks;
            } catch (e) { console.warn("Chart data not found for this date."); }
        }

        // 開啟圖表
        function openChart(id, name) {
            const data = cachedChartData[id];
            if (!data) { alert("此個股暫無序列數據"); return; }

            $('#chartTitle').text(`${id} ${name} 籌碼深度分析`);
            $('#chartModal').removeClass('hidden').addClass('flex');

            if (chartInstance) chartInstance.dispose();
            chartInstance = echarts.init(document.getElementById('mainChart'), 'dark');

            const s = data.series;
            const dates = s.map(x => x.date);

            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' },
                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                    borderColor: '#334155'
                },
                legend: {
                    data: ['股價', '法人累計', '融資累計', '借券累計', '法人增減', '融資增減', '借券增減'],
                    top: 0, textStyle: { color: '#94a3b8' }
                },
                grid: { top: '15%', left: '3%', right: '3%', bottom: '5%', containLabel: true },
                xAxis: { type: 'category', data: dates, axisLine: { lineStyle: { color: '#475569' } } },
                yAxis: [
                    { type: 'value', name: '張數', splitLine: { lineStyle: { color: '#1e293b' } } },
                    { type: 'value', name: '價格', position: 'right', scale: true, splitLine: { show: false } }
                ],
                series: [
                    // 柱狀圖 (每日)
                    { name: '法人增減', type: 'bar', stack: 'daily', data: s.map(x => x.bar_inst), itemStyle: { color: '#ef4444', opacity: 0.4 } },
                    { name: '融資增減', type: 'bar', stack: 'daily', data: s.map(x => x.bar_margin), itemStyle: { color: '#f59e0b', opacity: 0.4 } },
                    { name: '借券增減', type: 'bar', stack: 'daily', data: s.map(x => x.bar_sbl), itemStyle: { color: '#a855f7', opacity: 0.4 } },
                    // 折線圖 (5日累計 - 直接取資料)
                    { name: '法人累計', type: 'line', data: s.map(x => x.line_inst5), smooth: true, symbol: 'none', lineStyle: { width: 3, color: '#f87171' } },
                    { name: '融資累計', type: 'line', data: s.map(x => x.line_margin5), smooth: true, symbol: 'none', lineStyle: { width: 3, color: '#fbbf24' } },
                    { name: '借券累計', type: 'line', data: s.map(x => x.line_sbl5), smooth: true, symbol: 'none', lineStyle: { width: 3, color: '#c084fc' } },
                    // 股價
                    {
                        name: '股價', type: 'line', yAxisIndex: 1, data: s.map(x => x.price), z: 10,
                        lineStyle: { width: 4, color: '#38bdf8', shadowBlur: 10, shadowColor: '#38bdf866' },
                        itemStyle: { color: '#38bdf8' }
                    }
                ]
            };
            chartInstance.setOption(option);
        }

        // Modal 控制
        function openInfoModal() { $('#infoModal').removeClass('hidden').addClass('flex modal-active'); }
        function showTagDetails(name, tags) {
            $('#modalStockTitle').text(name);
            $('#modalTagContent').html(tags.split(',').map(t => `<span class="bg-sky-900/50 text-sky-300 border border-sky-700 text-xs px-2 py-1 rounded">${t}</span>`).join(''));
            $('#tagModal').removeClass('hidden').addClass('flex modal-active');
        }
        function closeModal(id) { $(`#${id}`).addClass('hidden').removeClass('flex modal-active'); }

        // 視窗縮放自適應
        window.onresize = () => chartInstance && chartInstance.resize();

        // 點擊 Modal 外部關閉
        $(window).on('click', function (e) {
            if ($(e.target).is('#chartModal')) closeModal('chartModal');
            if ($(e.target).is('#tagModal')) closeModal('tagModal');
            if ($(e.target).is('#infoModal')) closeModal('infoModal');
        });
    </script>
</body>

</html>

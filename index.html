<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票數據分析看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <style>
        /* DataTables 樣式微調 */
        .dataTables_wrapper .dataTables_length select {
            padding-right: 2rem;
        }

        table.dataTable {
            border-collapse: collapse !important;
            margin-top: 1rem !important;
            margin-bottom: 1rem !important;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background: #3b82f6 !important;
            color: white !important;
            border: 1px solid #3b82f6 !important;
        }

        /* 強制表格內容不換行，確保寬度由內容決定 */
        #stockTable td,
        #stockTable th {
            white-space: nowrap !important;
            padding: 12px 15px !important;
            /* 加寬一點比較好閱讀 */
        }

        /* 讓捲軸更明顯一點 */
        .dataTables_wrapper {
            padding-top: 10px;
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header
            class="mb-8 border-b border-gray-700 pb-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">Stock Analysis Dashboard</h1>
                <p class="text-gray-400 text-sm mt-1">自動掃描 /data/ 目錄 JSON 數據</p>
            </div>

            <div class="flex items-center gap-3">
                <label for="dateSelect" class="font-medium">選擇分析日期：</label>
                <select id="dateSelect"
                    class="bg-gray-800 border border-gray-600 rounded px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="">載入中...</option>
                </select>
            </div>
        </header>

        <div class="bg-gray-800 rounded-xl shadow-2xl p-6 overflow-x-auto">
            <table id="stockTable" class="display nowrap w-full" style="width:100%">
                <thead class="bg-gray-700 text-gray-200">
                    <tr>
                        <th>代號</th>
                        <th>名稱</th>
                        <th>族群概念</th>
                        <th>收盤</th>
                        <th>成交量</th>
                        <th>昨量比</th>
                        <th>10日位階</th>
                        <th>10日振幅</th>
                        <th>1日集中度</th>
                        <th>5日集中度</th>
                        <th>10日集中度</th>
                        <th>20日集中度</th>
                        <th>外資5日</th>
                        <th>投信5日</th>
                        <th>外資連買</th>
                        <th>投信連買</th>
                        <th>券補力</th>
                        <th>券砸力</th>
                        <th>券淨賣還</th>
                        <th>券淨賣還5日</th>
                        <th>融資餘額</th>
                        <th>借券餘額</th>
                        <th>券賣餘額</th>
                    </tr>
                </thead>
                <tbody class="text-gray-300">
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>

    <script>
        let table;

        $(document).ready(function () {
            // 1. 初始化 DataTables (先初始化，資料晚點補)
            table = $('#stockTable').DataTable({
                responsive: false,
                scrollX: true,
                autoWidth: false,
                language: {
                    url: "https://cdn.datatables.net/plug-ins/1.13.7/i18n/zh-HANT.json"
                },
                columnDefs: [
                    { className: "dt-center", targets: "_all" },
                    { width: "100px", targets: 2 }, // 例如族群概念
                    {
                        targets: [3, 4, 5],
                        render: function (data) {
                            return `<span class="font-mono font-semibold">${data}</span>`;
                        }
                    }
                ]
            });

            // 2. 從檔案獲取清單並初始化選單
            initDateSelectFromJSON();

            // 監聽下拉選單變化
            $('#dateSelect').on('change', function () {
                const date = $(this).val();
                if (date) {
                    loadData(date);
                }
            });
        });

        // 改動點：將原本寫死的 initDateSelect 改為異步讀取 JSON
        async function initDateSelectFromJSON() {
            const select = $('#dateSelect');
            try {
                const response = await fetch('./data/dateList.json');
                if (!response.ok) throw new Error('無法讀取清單');

                const availableDates = await response.json();

                select.empty();
                availableDates.forEach(date => {
                    select.append(`<option value="${date}">${date}</option>`);
                });

                // 預設載入最新的日期
                if (availableDates.length > 0) {
                    select.val(availableDates[0]).trigger('change');
                }
            } catch (error) {
                console.error("初始化清單失敗:", error);
                select.html('<option>載入清單失敗</option>');
            }
        }

        async function loadData(date) {
            const filePath = `./data/${date}_fliter.json`;

            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error('找不到該日期的資料檔案');

                const data = await response.json();

                table.clear();
                data.forEach(item => {
                    table.row.add([
                        item.stock_id,
                        `<span class="text-blue-300 font-bold">${item.stock_name}</span>`,
                        `<span class="text-xs text-gray-400">${item.concept}</span>`,
                        item.close,
                        item.vol,
                        item.vol_ratio,
                        item.rank10,
                        item.amp10,
                        item.con1,
                        item.con5,
                        item.con10,
                        item.con20,
                        item.foreign_sum5,
                        item.trust_sum5,
                        item.foreign_streak_days,
                        item.trust_streak_days,
                        item.squeeze,
                        item.bullet,
                        item.net_sbl,
                        item.net_sbl_sum5,
                        item.margin_balance,
                        item.sbl_total,
                        item.sbl_sold_balance
                    ]);
                });
                table.draw();

            } catch (error) {
                console.error(error);
                alert(`載入失敗: ${error.message}\n請確認路徑是否存在: ${filePath}`);
            }
        }
    </script>
</body>

</html>

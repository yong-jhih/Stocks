<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>籌碼大數據分析 - 專業版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/fixedcolumns/4.3.0/css/fixedColumns.dataTables.min.css">
    <style>
        body {
            background-color: #020617;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
        }

        .dataTables_wrapper {
            background: #0f172a;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #1e293b;
        }

        table.dataTable thead th {
            background-color: #1e293b !important;
            color: #38bdf8 !important;
            border-bottom: 2px solid #0ea5e9 !important;
        }

        table.dataTable tbody td {
            background-color: #0f172a !important;
            border-bottom: 1px solid #1e293b !important;
        }

        .DTFC_LeftWrapper {
            border-right: 3px solid #0ea5e9;
        }

        tr:hover td {
            background-color: #1e293b !important;
        }

        #chartModal {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>

<body class="p-4 md:p-6">
    <div class="max-w-[1650px] mx-auto">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold text-sky-400 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" />
                </svg>
                盤後籌碼深度篩選
            </h1>
            <div class="flex items-center gap-3 bg-slate-800 p-2 rounded-xl">
                <span class="text-slate-400 text-sm">數據日期</span>
                <select id="dateSelect"
                    class="bg-slate-900 border-none text-sky-400 rounded-md focus:ring-2 focus:ring-sky-500"></select>
            </div>
        </header>

        <div class="shadow-xl">
            <table id="stockTable" class="display stripe nowrap w-full">
                <thead>
                    <tr>
                        <th>代號</th>
                        <th>名稱</th>
                        <th>族群</th>
                        <th>標籤</th>
                        <th>收盤</th>
                        <th>成交量</th>
                        <th>昨量比</th>
                        <th>1日集中</th>
                        <th>5日集中</th>
                        <th>外資5日</th>
                        <th>投信5日</th>
                        <th>券補力</th>
                        <th>券砸力</th>
                        <th>融資餘額</th>
                        <th>借券餘額</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- 圖表彈窗 -->
    <div id="chartModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/90 p-4">
        <div
            class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-6xl h-[90vh] flex flex-col shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            <div class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-800/40">
                <div>
                    <h2 class="text-2xl font-bold text-white" id="chartStockTitle">---</h2>
                    <p class="text-slate-400 text-sm">柱狀：每日增減值 | 折線：5日累計數值與價格</p>
                </div>
                <button onclick="closeChartModal()"
                    class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-700 text-slate-300 text-2xl transition-all">✕</button>
            </div>

            <div id="mainChart" class="flex-1 w-full p-4"></div>

            <div class="p-4 border-t border-slate-800 bg-slate-900 flex justify-end">
                <button onclick="closeChartModal()"
                    class="px-8 py-2 bg-sky-600 hover:bg-sky-500 text-white rounded-lg font-medium transition-colors">確認並關閉</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/fixedcolumns/4.3.0/js/dataTables.fixedColumns.min.js"></script>

    <script>
        let table;
        let chartInstance = null;
        let cachedChartData = {};

        $(document).ready(function () {
            table = $('#stockTable').DataTable({
                scrollX: true, fixedColumns: { left: 2 },
                pageLength: 25,
                language: { url: "https://cdn.datatables.net/plug-ins/1.13.7/i18n/zh-HANT.json" }
            });

            $('#stockTable tbody').on('click', 'tr', function () {
                const row = table.row(this).data();
                if (row) openChart(row[0], $(row[1]).text());
            });

            initSystem();
        });

        async function initSystem() {
            try {
                const res = await fetch('./data/dateList.json');
                const dates = await res.json();
                const $sel = $('#dateSelect');
                dates.forEach(d => $sel.append(new Option(d, d)));

                $sel.on('change', async function () {
                    const date = this.value;
                    loadMainTable(date);
                    const chartRes = await fetch(`./data/${date}_charts.json`);
                    const jsonBody = await chartRes.json();
                    cachedChartData = jsonBody.stocks;
                }).trigger('change');
            } catch (e) { console.error("Data loading error:", e); }
        }

        async function loadMainTable(date) {
            const res = await fetch(`./data/${date}_filter.json`);
            const data = await res.json();
            table.clear();
            data.forEach(item => {
                table.row.add([
                    item.stock_id, `<span class="text-sky-400 font-bold">${item.stock_name}</span>`,
                    item.concept, `<span class="text-xs">${item.tags.substring(0, 8)}...</span>`,
                    item.close, item.vol, item.vol_ratio, item.con1, item.con5,
                    item.foreign_sum5, item.trust_sum5, item.squeeze, item.bullet,
                    item.margin_balance, item.sbl_total
                ]);
            });
            table.draw();
        }

        function openChart(id, name) {
            const stockData = cachedChartData[id];
            if (!stockData) { alert("找不到該股的圖表數據"); return; }

            $('#chartStockTitle').text(`${id} ${name}`);
            $('#chartModal').removeClass('hidden').addClass('flex');

            if (chartInstance) chartInstance.dispose();
            chartInstance = echarts.init(document.getElementById('mainChart'), 'dark');

            const s = stockData.series;
            const dates = s.map(x => x.date);

            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross', label: { backgroundColor: '#1e293b' } },
                    borderWidth: 0,
                    backgroundColor: 'rgba(15, 23, 42, 0.85)'
                },
                legend: {
                    data: ['股價', '法人累計', '融資累計', '借券累計', '法人增減', '融資增減', '借券增減'],
                    top: 0, itemGap: 20, inactiveColor: '#475569'
                },
                grid: { top: '15%', left: '5%', right: '5%', bottom: '8%', containLabel: true },
                xAxis: { type: 'category', data: dates, axisLine: { lineStyle: { color: '#475569' } } },
                yAxis: [
                    { type: 'value', name: '張數', splitLine: { lineStyle: { color: '#1e293b' } } },
                    { type: 'value', name: '價格', position: 'right', scale: true, splitLine: { show: false } }
                ],
                series: [
                    // 1. 柱狀圖：每日增減 (放在底層)
                    { name: '法人增減', type: 'bar', stack: 'daily', data: s.map(x => x.bar_inst), itemStyle: { color: '#ef4444', opacity: 0.4 } },
                    { name: '融資增減', type: 'bar', stack: 'daily', data: s.map(x => x.bar_margin), itemStyle: { color: '#f59e0b', opacity: 0.4 } },
                    { name: '借券增減', type: 'bar', stack: 'daily', data: s.map(x => x.bar_sbl), itemStyle: { color: '#a855f7', opacity: 0.4 } },

                    // 2. 折線圖：5日累計 (加粗)
                    {
                        name: '法人累計', type: 'line', smooth: true, symbol: 'none',
                        data: s.map(x => x.line_inst5), lineStyle: { width: 3, color: '#f87171' }
                    },
                    {
                        name: '融資累計', type: 'line', smooth: true, symbol: 'none',
                        data: s.map(x => x.line_margin5), lineStyle: { width: 3, color: '#fbbf24' }
                    },
                    {
                        name: '借券累計', type: 'line', smooth: true, symbol: 'none',
                        data: s.map(x => x.line_sbl5), lineStyle: { width: 3, color: '#c084fc' }
                    },

                    // 3. 股價折線 (置頂且最粗)
                    {
                        name: '股價', type: 'line', yAxisIndex: 1,
                        data: s.map(x => x.price), z: 20,
                        lineStyle: { width: 5, color: '#38bdf8', shadowBlur: 10, shadowColor: 'rgba(56, 189, 248, 0.5)' },
                        itemStyle: { color: '#38bdf8' }
                    }
                ]
            };

            chartInstance.setOption(option);
        }

        function closeChartModal() { $('#chartModal').addClass('hidden').removeClass('flex'); }
        window.onresize = () => chartInstance && chartInstance.resize();
    </script>
</body>

</html>

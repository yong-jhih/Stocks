<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票數據分析看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <style>
        /* 1. 基本佈局修復 */
        body {
            overflow-x: hidden;
            /* 防止最外層出現捲軸 */
        }

        .dataTables_wrapper {
            background: #1f2937;
            padding: 1.5rem;
            border-radius: 0.75rem;
            color: #d1d5db;
        }

        /* 2. 強制表格內容不換行，確保欄位能撐開 */
        table.dataTable {
            width: 100% !important;
            margin: 0 !important;
            border-collapse: collapse !important;
        }

        table.dataTable thead th {
            background-color: #374151 !important;
            color: #60a5fa !important;
            white-space: nowrap !important;
            border-bottom: 1px solid #4b5563 !important;
            text-align: center !important;
            padding: 12px 15px !important;
        }

        table.dataTable tbody td {
            white-space: nowrap !important;
            padding: 10px 15px !important;
            border-bottom: 1px solid #374151 !important;
            text-align: center !important;
        }

        /* 3. 解決捲軸問題 */
        .dataTables_scrollBody {
            border-bottom: 1px solid #4b5563 !important;
        }

        /* 自定義捲軸樣式 (Chrome/Edge/Safari) */
        .dataTables_scrollBody::-webkit-scrollbar {
            height: 10px;
            width: 10px;
        }

        .dataTables_scrollBody::-webkit-scrollbar-track {
            background: #111827;
        }

        .dataTables_scrollBody::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 5px;
        }

        .dataTables_scrollBody::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
        }

        /* DataTables 分頁按鈕美化 */
        .dataTables_wrapper .dataTables_paginate .paginate_button {
            color: #9ca3af !important;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background: #3b82f6 !important;
            border-color: #3b82f6 !important;
            color: white !important;
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-[1600px] mx-auto">
        <header
            class="mb-8 border-b border-gray-700 pb-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">Stock Analysis Dashboard</h1>
                <p class="text-gray-400 text-sm mt-1">自動掃描 /data/ 目錄 JSON 數據</p>
            </div>

            <div class="flex items-center gap-3">
                <label for="dateSelect" class="font-medium">選擇分析日期：</label>
                <select id="dateSelect"
                    class="bg-gray-800 border border-gray-600 rounded px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="">載入中...</option>
                </select>
            </div>
        </header>

        <!-- 表格容器 -->
        <div class="shadow-2xl overflow-hidden">
            <table id="stockTable" class="display nowrap" style="width:100%">
                <thead>
                    <tr>
                        <th>代號</th>
                        <th>名稱</th>
                        <th>族群概念</th>
                        <th>標籤</th>
                        <th>收盤</th>
                        <th>成交量</th>
                        <th>昨量比</th>
                        <th>5日均量</th>
                        <th>10日均量</th>
                        <th>20日均量</th>
                        <th>10日位階</th>
                        <th>10日振幅</th>
                        <th>1日集中度</th>
                        <th>5日集中度</th>
                        <th>10日集中度</th>
                        <th>20日集中度</th>
                        <th>外資5日</th>
                        <th>投信5日</th>
                        <th>外資連買</th>
                        <th>投信連買</th>
                        <th>券補力</th>
                        <th>券砸力</th>
                        <th>券淨賣還</th>
                        <th>券淨賣還5日</th>
                        <th>融資餘額</th>
                        <th>借券餘額</th>
                        <th>券賣餘額</th>
                    </tr>
                </thead>
                <tbody class="text-gray-300">
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>

    <script>
        let table;

        $(document).ready(function () {
            // 1. 初始化 DataTables
            table = $('#stockTable').DataTable({
                scrollX: true,           // 開啟橫向捲軸
                scrollCollapse: true,
                autoWidth: false,        // 關閉自動寬度，交給 CSS nowrap 處理
                pageLength: 25,
                language: {
                    url: "https://cdn.datatables.net/plug-ins/1.13.7/i18n/zh-HANT.json"
                },
                columnDefs: [
                    { className: "dt-center", targets: "_all" },
                    { width: "150px", targets: 2 }, // 族群概念給寬一點
                    { width: "150px", targets: 3 }, // 標籤
                    {
                        targets: [4, 5, 6],
                        render: function (data) {
                            return `<span class="font-mono font-semibold">${data}</span>`;
                        }
                    }
                ],
                // 每次表格繪製完成後調整對齊
                drawCallback: function () {
                    table.columns.adjust();
                }
            });

            initDateSelectFromJSON();

            $('#dateSelect').on('change', function () {
                const date = $(this).val();
                if (date) {
                    loadData(date);
                }
            });
        });

        async function initDateSelectFromJSON() {
            const select = $('#dateSelect');
            try {
                const response = await fetch('./data/dateList.json');
                if (!response.ok) throw new Error('無法讀取清單');
                const availableDates = await response.json();

                select.empty();
                availableDates.forEach(date => {
                    select.append(`<option value="${date}">${date}</option>`);
                });

                if (availableDates.length > 0) {
                    select.val(availableDates[0]).trigger('change');
                }
            } catch (error) {
                console.error("初始化清單失敗:", error);
                select.html('<option>載入失敗</option>');
            }
        }

        async function loadData(date) {
            const filePath = `./data/${date}_filter.json`;
            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error('找不到該日期的資料檔案');
                const data = await response.json();

                table.clear();
                data.forEach(item => {
                    table.row.add([
                        item.stock_id,
                        `<span class="text-blue-300 font-bold">${item.stock_name}</span>`,
                        `<span class="text-xs text-gray-400">${item.concept}</span>`,
                        item.tags,
                        item.close,
                        item.vol,
                        item.vol_ratio,
                        item.vma5,
                        item.vma10,
                        item.vma20,
                        item.rank10,
                        item.amp10,
                        item.con1,
                        item.con5,
                        item.con10,
                        item.con20,
                        item.foreign_sum5,
                        item.trust_sum5,
                        item.foreign_streak_days,
                        item.trust_streak_days,
                        item.squeeze,
                        item.bullet,
                        item.net_sbl,
                        item.net_sbl_sum5,
                        item.margin_balance,
                        item.sbl_total,
                        item.sbl_sold_balance
                    ]);
                });
                table.draw();

                // 關鍵：資料加載後強制重新計算欄位寬度以對齊表頭
                setTimeout(() => {
                    table.columns.adjust().draw();
                }, 100);

            } catch (error) {
                console.error(error);
                alert(`載入失敗: ${error.message}`);
            }
        }
    </script>
</body>

</html>
